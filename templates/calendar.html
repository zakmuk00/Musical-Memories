{% extends "layout.html" %}

{% block title %}Calendar{% endblock %}
{% block head %}
    {{ super() }}
    <link rel="stylesheet" href="{{ url_for('static', filename='css/calendar.css') }}">
{% endblock %}
{% block content %}

<div class="row justify-content-center g-4">
    <!--Right side-->
    <div class="col-xl-8 col-lg-7 col-md-12">
        <div class="card shadow-sm border-0 p-4 h-100" style="background-color: #FAF6EE; border-radius: 16px;">
            <div class="card-body">
                <a href="/on-this-day" class="btn btn-primary fw-bold">
                    On This Day
                </a>
                <div class="d-flex align-items-center justify-content-center mb-4">
                    <h2 class="fw-bold mb-0 text-center" style="font-family: 'Georgia', cursive, sans-serif; color: #8C6239;">Your Musical Journey</h2>
                </div>
                <div id="calendar" class="p-3 bg-white shadow-sm" style="border-radius: 12px;"></div>
            </div>
        </div>
    </div>
    <!--Right side-->
    <div class="col-xl-4 col-lg-5 col-md-12">
        <div class="card shadow-sm border-0 p-4 h-100" style="background-color: #FAF6EE; border-radius: 16px;">
            <div class="card-body d-flex flex-column" style="min-height: 500px;">
                <label for="entry-search" class="form-label fw-bold mb-3" style="color: #8C6239; font-size: 1.25rem; font-family: 'Georgia', sans-serif;">Search Memories</label>
                <input 
                    type="text" 
                    id="entry-search" 
                    class="form-control mb-4 shadow-sm" 
                    placeholder="Type a song, artist, or note..." 
                    style="border-radius: 8px; border: 1px solid #ddd; padding: 10px 14px; font-size: 0.95rem;"
                />
                
                <h6 class="text-uppercase tracking-wider fw-bold text-muted mb-3" style="font-size: 0.75rem; letter-spacing: 1px;">Results</h6>
                
                <div 
                    id="search-results" 
                    style="
                        display: flex;
                        flex-direction: column;
                        gap: 12px;
                        max-height: 520px; 
                        overflow-y: auto;
                        padding-right: 4px;
                    "
                >
                    <div class="text-center text-muted py-5" id="search-placeholder-msg">
                        <p class="mb-0" style="font-size: 0.9rem;">Start typing to search your memory timeline...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.21/index.global.min.js"></script>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const calendarEl = document.getElementById('calendar');
        
        // Jinja safely injected variables
        const userNotes = {{ user_notes | tojson | safe }};

        const calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            editable: true,
            height: 750,        
            expandRows: true,   
            aspectRatio: 1.3,

            dateClick: (info) => {
                const dateStr = info.dateStr;
                
                if (userNotes && userNotes[dateStr]) {
                    window.location.href = `/note?date=${dateStr}`;
                } else {
                    window.location.href = `/noteMaker?date=${dateStr}`;
                }
            },

            dayCellDidMount: (arg) => {
                const dateStr = arg.date.toISOString().split('T')[0];
                const noteData = userNotes[dateStr] || '';
                if (!noteData) return;
        
                const displayText = typeof noteData === 'string' ? noteData : noteData.text;
                const tiltClass = arg.date.getDate() % 2 === 0 ? 'tilt-even' : 'tilt-odd';
        
                const frame = arg.el.querySelector('.fc-daygrid-day-frame');
                frame.style.position = 'relative';
        
                const wrapper = document.createElement('div');
                wrapper.className = `album-wrapper`;
                wrapper.innerHTML = `
                    <img src="${noteData.song_image}" class="album-cover" alt="">
                `;
                frame.appendChild(wrapper);
            }
        });

        calendar.render();

        // --- SEARCH BAR FUNCTIONALITY ---
        const searchInput = document.getElementById("entry-search");
        const resultsContainer = document.getElementById("search-results");
        const placeholderMsg = document.getElementById("search-placeholder-msg");

        searchInput.addEventListener("input", function() {
            const query = searchInput.value.trim();

            if (query.length < 2) {
                resultsContainer.innerHTML = '';
                resultsContainer.appendChild(placeholderMsg);
                placeholderMsg.style.display = 'block';
                return;
            }

            fetch(`/search-entries?q=${encodeURIComponent(query)}`)
                .then(function(response) {
                    return response.json();
                })
                .then(function(data) {
                    resultsContainer.innerHTML = "";
                    
                    if (data.length === 0) {
                        resultsContainer.innerHTML = `
                            <div class="text-center text-muted py-5">
                                <p class="mb-0" style="font-size: 0.9rem;">No matching memories found.</p>
                            </div>`;
                        return;
                    }

                    data.forEach(function(entry) {
                        const item = document.createElement("a");
                        item.href = "/note?date=" + entry.date;
                        
                        item.style.display = "flex";
                        item.style.alignItems = "center";
                        item.style.padding = "16px";
                        item.style.textDecoration = "none";
                        item.style.color = "#333";
                        item.style.backgroundColor = "#ffffff";
                        item.style.border = "1px solid #eaeaea";
                        item.style.borderRadius = "12px";
                        item.style.transition = "transform 0.2s, box-shadow 0.2s";
                        item.style.boxShadow = "0 2px 6px rgba(0,0,0,0.02)";

                        item.addEventListener("mouseenter",function() {
                            item.style.transform = "translateY(-2px)";
                            item.style.boxShadow = "0 4px 12px rgba(0,0,0,0.06)";
                        });
                        item.addEventListener("mouseleave", function() {
                            item.style.transform = "translateY(0)";
                            item.style.boxShadow = "0 2px 6px rgba(0,0,0,0.02)";
                        });

                        let albumHTML = '';
                        if (entry.song_image) {
                            albumHTML = `<img src="${entry.song_image}" alt="Cover" style="width: 70px; height: 70px; border-radius: 10px; margin-right: 16px; object-fit: cover; flex-shrink: 0;" />`;
                        } else {
                            albumHTML = `
                                <div style="
                                    width: 70px; 
                                    height: 70px; 
                                    background-color: #E2E2E2; 
                                    border-radius: 10px; 
                                    margin-right: 16px; 
                                    display: flex; 
                                    align-items: center; 
                                    justify-content: center;
                                    text-align: center;
                                    padding: 4px;
                                    flex-shrink: 0;
                                ">
                                    <span style="font-size: 9px; font-weight: bold; color: #555; line-height: 1.1;">No Album Picture</span>
                                </div>`;
                        }

                        item.innerHTML = `
                            ${albumHTML}
                            <div style="flex-grow: 1; min-width: 0;">
                                <div style="font-weight: 700; font-size: 1.05rem; margin-bottom: 2px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: #2D2D2D;">
                                    ${entry.song_name || "Untitled"}
                                </div>
                                <div style="font-size: 0.8rem; color: #888; font-weight: 500;">
                                    ${entry.date}
                                </div>
                            </div>
                        `;
                        resultsContainer.appendChild(item);
                    });
                })
                .catch(err => console.error("Error retrieving matches:", err));
        });
    }); 
</script>
{% endblock %}
